name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same PR / branch.
# Each push gets a fresh, definitive result.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Node 22 is the current Active LTS (supported through April 2027)
        # and what Cloudflare Pages runs by default. The codebase ships to
        # browsers, not Node, so the only Node-specific surface is the
        # build / test tooling. Single version is enough.
        task: [unit, typecheck]
        # Lint is intentionally not in this matrix. The baseline has a
        # cluster of `react-refresh/only-export-components` warnings
        # from earlier component refactors; enabling lint as a gate
        # would block every PR on pre-existing noise. Cleanup is
        # tracked as a follow-up PR that will also turn on
        # `eslint-plugin-security`. Bundle-size and `npm audit` gates
        # already exist (see the `build` and `audit` jobs below).
        # CodeQL runs separately via the auto-generated `codeql.yml`
        # workflow.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: install
        run: npm ci

      - name: run task
        run: |
          case "${{ matrix.task }}" in
            unit)      npm test ;;
            typecheck) npx tsc --noEmit ;;
          esac

  coverage:
    # Coverage gate. Thresholds live in vitest.config.ts and are set
    # just below the current numbers, so a PR that drops coverage
    # (e.g. removes a test file) fails the gate. Bump thresholds
    # upward as the suite grows.
    name: coverage threshold
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage

  build:
    # Verifies the production bundle still compiles with the test changes
    # in place. Catches "the test setup leaked into the bundle" mistakes.
    name: production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: assert no test file in dist
        # Sanity check: tests/ MUST NOT end up in the production bundle.
        # If this finds anything, our tsconfig.app.json `include` got
        # widened or a test file got accidentally imported from src/.
        run: |
          if find dist -name '*.test.*' -print -quit | grep -q .; then
            echo "::error::Test files found in dist/ — production bundle contaminated"
            find dist -name '*.test.*'
            exit 1
          fi

      - name: bundle-size budget
        # Catches silent bundle bloat. The runtime ships every byte under
        # dist/assets/*.js to the browser; if the total drifts much past
        # the current size something has been pulled in unintentionally
        # (a tree-shaking regression, an accidental whole-library import,
        # a polyfill imported in app code, etc.). Threshold is the
        # current measurement (3.66 MiB) + ~10% headroom, so legitimate
        # growth is fine but quiet 30%-over-six-months drift fails CI.
        # Bump the budget upward in the same PR that legitimately grows
        # the bundle — that makes "is this growth justified?" a code-
        # review conversation instead of a thing nobody notices.
        run: |
          BUDGET_BYTES=4194304   # 4.0 MiB
          TOTAL=$(find dist/assets -name "*.js" -exec stat -c %s {} \; | awk '{s+=$1} END {print s+0}')
          echo "Total dist/assets JS: $TOTAL bytes (budget: $BUDGET_BYTES)"
          if [ "$TOTAL" -gt "$BUDGET_BYTES" ]; then
            echo "::error::Bundle ${TOTAL}B exceeds budget ${BUDGET_BYTES}B (~$((TOTAL * 100 / BUDGET_BYTES))% of budget)."
            echo "Bump BUDGET_BYTES in test.yml if growth is justified."
            exit 1
          fi

  bundle-sync:
    # Catches drift between `tex/` source files and the committed
    # `public/lib/latex-templates.js` bundle. The runtime loads the
    # bundle (not the source) — so an editor change to `tex/main.tex`
    # without a rebuild silently ships stale templates to users. We
    # hit this exact bug in PR #67 (subject-underline fix went through
    # tex/ but the bundle wasn't regenerated, so the deployed PDF still
    # had the old behavior). One-line guard against the whole class.
    name: bundle in sync with tex/
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: rebuild bundle and assert no diff
        run: |
          bash build-templates.sh
          if ! git diff --exit-code public/lib/latex-templates.js; then
            echo "::error::public/lib/latex-templates.js is out of sync with tex/ source."
            echo "Run \`bash build-templates.sh\` locally and commit the regenerated bundle."
            exit 1
          fi

  audit:
    # `npm audit --audit-level=high` gate. Currently 19 high vulns —
    # all from a single GHSA advisory transitive in @react-pdf-viewer/*
    # (no upstream fix available; tracked separately in feat/ci-lint-security
    # for the dep upgrade). Allowlisting that one advisory by ID lets
    # the gate be effective immediately: any NEW high/critical vuln
    # fails CI, while the known-and-tracked one doesn't false-fail.
    #
    # When the @react-pdf-viewer upgrade lands and the advisory is
    # gone, drop the entry from KNOWN_ADVISORIES and the gate becomes
    # vanilla `npm audit --audit-level=high`.
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: high-severity audit with explicit allowlist
        run: |
          # Comma-separated GHSA / npm advisory IDs we accept (with reason).
          # Add new entries as a separate PR with the reason inline.
          export KNOWN_ADVISORIES="1104044"   # @react-pdf-viewer transitive — no upstream fix
          npm audit --json > audit.json || true
          UNKNOWN=$(python3 <<'PY'
          import json, os
          allow = set(os.environ.get('KNOWN_ADVISORIES', '').split(','))
          d = json.load(open('audit.json'))
          bad = []
          for name, info in d.get('vulnerabilities', {}).items():
              sev = info.get('severity')
              if sev not in ('high', 'critical'):
                  continue
              for v in info.get('via', []):
                  if isinstance(v, dict) and v.get('source'):
                      if str(v['source']) not in allow:
                          bad.append(f'{name} via advisory {v["source"]} ({sev}, {v.get("title","")})')
          for b in sorted(set(bad)):
              print(b)
          PY
          )
          if [ -n "$UNKNOWN" ]; then
            echo "::error::New high/critical vulnerabilities not in the allowlist:"
            echo "$UNKNOWN"
            echo ""
            echo "Either upgrade the offending dep or, if no fix is available,"
            echo "add the advisory ID to KNOWN_ADVISORIES in .github/workflows/test.yml"
            echo "with an inline comment explaining why."
            exit 1
          fi
          echo "No new high/critical vulnerabilities outside the allowlist."

  compile-matrix:
    # End-to-end LaTeX + DOCX compile harness. Three test files run
    # under `tests/integration/`:
    #   - latex-compile.test.ts    : 380 pairwise fixtures × xelatex
    #   - docx-compile.test.ts     : 380 pairwise fixtures × pandoc
    #   - differential.test.ts     : 10 curated fixtures, asserts
    #                                 user-supplied subject text
    #                                 appears in BOTH extracted PDF
    #                                 and DOCX outputs (catches path
    #                                 divergence — exactly the kind of
    #                                 bug PR #67 had with subject
    #                                 underline).
    # Total ≈ 770 tests. Wall time ~5 min on Ubuntu's 4-vCPU runner
    # (xelatex dominates; pandoc + pdf-parse + mammoth are ~50× faster).
    name: compile matrix (LaTeX + DOCX)
    runs-on: ubuntu-latest
    # Actual run time is ~5 min (xelatex dominates, ~3s × 380 fixtures
    # / 4-way pool). 15 min budget catches a stuck job without letting
    # it burn 25 min of runner time.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: install xelatex + pandoc
        # texlive-xetex pulls in the engine + ulem + hyperref + the
        # font packages (txfonts, txfontsb) we use. tabularx + enumitem
        # come from texlive-latex-extra. pandoc ships standalone (3.x
        # in current Ubuntu). ~120MB total install.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            pandoc

      - run: npm ci

      - name: run integration matrix
        run: npm run test:integration

      - name: upload failing tex dirs
        # On failure, the harness leaves /tmp/dondocs-compile-XXXX dirs
        # with the .tex files + log so a dev can `cd` in and reproduce.
        # Pull them out as artifacts to make CI failures debuggable.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failing-compile-artifacts
          path: |
            /tmp/dondocs-compile-*
            /tmp/dondocs-docx-*
          retention-days: 7
          if-no-files-found: ignore
